<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Cumpleaños</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;

background-image:url("fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

overflow:hidden;
}


.contenedor{

background:rgba(0,0,0,.65);
padding:35px;
border-radius:25px;
text-align:center;
color:white;

}


h1{
font-size:40px;
}


#contador{

font-size:42px;
color:#00d9ff;
font-weight:bold;

}


.final{

font-size:42px;
font-weight:bold;
animation:arcoiris 2s infinite;

}


@keyframes arcoiris{

0%{color:red}
20%{color:orange}
40%{color:yellow}
60%{color:lime}
80%{color:cyan}
100%{color:magenta}

}


#config{

position:fixed;
top:15px;
right:20px;
font-size:35px;
cursor:pointer;

}


#consola{

display:none;
position:fixed;
top:70px;
right:20px;

background:#111;
padding:15px;
border-radius:15px;

}


#cmd{

background:#000;
color:#00ff00;
border:0;

padding:10px;
width:220px;

}


.ubicacion{

margin-top:25px;
font-size:20px;

}


.ubicacion a{

color:#00d9ff;
text-decoration:none;
font-weight:bold;

}


#musicaBtn{

position:fixed;
bottom:20px;
right:20px;

background:#111;
color:white;

border:0;
padding:12px;

border-radius:15px;
cursor:pointer;

font-size:18px;

}


</style>

</head>


<body>


<audio id="musica" autoplay loop>

<source src="video.mp3" type="audio/mpeg">

</audio>



<button id="musicaBtn">🔊 Música</button>



<div id="config">⚙️</div>



<div id="consola">

<input id="cmd" placeholder="/count on">

</div>




<div class="contenedor">


<h1>🎉 Mi Cumpleaños 🎉</h1>



<div id="contador">

Cargando...

</div>



<div id="mensaje"></div>



<div class="ubicacion">

📍 

<a href="https://maps.app.goo.gl/ggMdEB5QXXvAB8A16" target="_blank">

Plaza San Miguel de Garicoits

</a>

</div>


</div>






<script>


const fechaFinal =
new Date("July 4, 2026 13:00:00").getTime();




function actualizar(){


let ahora=new Date().getTime();

let distancia=fechaFinal-ahora;



if(distancia<=0){


document.getElementById("contador").style.display="none";


document.getElementById("mensaje").innerHTML=

"<div class='final'>¡GRACIAS POR VENIR A MI CUMPLEAÑOS!</div>";


return;

}



let dias=Math.floor(distancia/(1000*60*60*24));


let horas=Math.floor(
(distancia%(1000*60*60*24))/(1000*60*60)
);



let minutos=Math.floor(
(distancia%(1000*60*60))/(1000*60)
);



let segundos=Math.floor(
(distancia%(1000*60))/1000
);




document.getElementById("contador").innerHTML=

dias+" días "+
horas+" horas "+
minutos+" minutos "+
segundos+" segundos";

}



setInterval(actualizar,1000);

actualizar();





// consola


let boton=document.getElementById("config");

let consola=document.getElementById("consola");

let input=document.getElementById("cmd");



boton.onclick=function(){


if(consola.style.display==="block"){

consola.style.display="none";


}else{

consola.style.display="block";

}

}




input.addEventListener("keydown",function(e){


if(e.key==="Enter"){


let comando=input.value;



if(comando==="/count off"){

document.getElementById("contador").style.display="none";

}



if(comando==="/count on"){

document.getElementById("contador").style.display="block";

}




if(comando==="/count terminado"){


document.getElementById("contador").style.display="none";


document.getElementById("mensaje").innerHTML=

"<div class='final'>¡GRACIAS POR VENIR A MI CUMPLEAÑOS!</div>";

}



input.value="";


}

});





// música


let musica=document.getElementById("musica");

let btn=document.getElementById("musicaBtn");



btn.onclick=function(){


if(musica.paused){


musica.play();

btn.innerHTML="🔊 Música";


}else{


musica.pause();

btn.innerHTML="🔇 Música";


}


};



</script>


</body>
</html>
